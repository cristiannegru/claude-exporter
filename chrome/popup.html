<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* Dark mode by default */
    :root {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --border-color: #3a3a3a;
      --primary-color: #6b52e8;
      --primary-hover: #7d66f0;
      --secondary-color: #32b34a;
      --secondary-hover: #3cc752;
      --disabled-bg: #3a3a3a;
      --success-bg: #1a4d2e;
      --success-text: #90ee90;
      --error-bg: #4d1a1a;
      --error-text: #ff9999;dd
      --info-bg: #1a3d4d;
      --info-text: #87ceeb;
      --link-color: #8b7aff;
    }

    /* Light mode when system prefers light */
    :root[data-theme="light"] {
      --bg-color: #ffffff;
      --text-color: #333333;
      --border-color: #dddddd;
      --primary-color: #5436DA;
      --primary-hover: #4329B8;
      --secondary-color: #28a745;
      --secondary-hover: #218838;
      --disabled-bg: #cccccc;
      --success-bg: #d4edda;
      --success-text: #155724;
      --error-bg: #f8d7da;
      --error-text: #721c24;
      --info-bg: #d1ecf1;
      --info-text: #0c5460;
      --link-color: #5436DA;
    }

    body {
      width: 275px;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 0;
      max-height: 600px;
      overflow-y: auto;
    }
    h2 {
      margin-top: 0;
      color: var(--text-color);
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: none;
      border-radius: 4px;
      background: var(--primary-color);
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--primary-hover);
    }
    button:disabled {
      background: var(--disabled-bg);
      cursor: not-allowed;
      color: #999;
    }
    #browseConversations {
      background: var(--secondary-color);
      margin-top: 6px;
    }
    #browseConversations:hover {
      background: var(--secondary-hover);
    }
    .status {
      margin: 6px 0;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .success {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .error {
      background: var(--error-bg);
      color: var(--error-text);
    }
    .info {
      background: var(--info-bg);
      color: var(--info-text);
    }
    .info a {
      color: var(--link-color);
    }
    .options {
      margin: 8px 0;
    }
    label {
      display: block;
      margin: 6px;
      font-size: 12px;
      color: var(--text-color);
    }
    input[type="checkbox"] {
      margin-right: 5px;
    }
    select {
      width: 100%;
      padding: 4px;
      margin-top: 3px;
      border: 1px solid var(--border-color);
      border-radius: 3px;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 12px;
    }
    #popup-header {
      margin: -8px -8px 8px -8px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
      text-align: center;
    }
    #header-title {
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    #header-version {
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      margin-top: 3px;
    }
    .header-settings {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(255, 255, 255, 0.7);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }
    .header-settings:hover {
      color: white;
    }
    .header-settings svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <div id="popup-header" style="position: relative;">
    <div id="header-title">Claude Exporter</div>
    <div id="header-version"></div>
    <button class="header-settings" id="openSettings" title="Settings">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div style="padding: 0 5px;">
    <div id="setupNotice" class="status info" style="display: none;">
      ⚠️ Organization ID not configured. 
      <a href="#" id="openOptions">Click here to set it up</a>
    </div>
    
    <div class="options">
    <!-- Chat Export Options -->
    <div class="export-row">
      <label>
        Chat format:
        <select id="format">
          <option value="json">JSON</option>
          <option value="markdown">Markdown</option>
          <option value="text">Plain Text</option>
        </select>
      </label>

      <label title="Include the conversation messages in the exported file">
        <input type="checkbox" id="includeChats" checked>
        Chats
      </label>

      <label title="Include extended thinking blocks in the exported conversation">
        <input type="checkbox" id="includeThinking">
        Extended Thinking
      </label>

      <label title="Add conversation metadata (name, date, model, etc.) at the top of exported files">
        <input type="checkbox" id="includeMetadata">
        Metadata
      </label>
    </div>

    <!-- Artifact Export Options -->
    <div class="export-row" style="margin-top: 12px;">
      <label>
        Artifact format:
        <select id="artifactFormat">
          <option value="original">Original</option>
          <option value="markdown">Markdown</option>
          <option value="text">Plain Text</option>
          <option value="json">JSON</option>
        </select>
      </label>

      <label title="Include artifacts (code, documents, etc.) directly within the conversation text">
        <input type="checkbox" id="includeArtifacts">
        Inline Artifacts
      </label>

      <label title="Extract artifacts as separate files in nested folders">
        <input type="checkbox" id="extractArtifacts">
        Nested Artifacts
      </label>

      <label title="Flatten artifact structure (no subfolders, with conversation name prefix)">
        <input type="checkbox" id="flattenArtifacts">
        Flat Artifacts
      </label>
    </div>
  </div>

  <button id="exportCurrent">Export Current Conversation</button>
  <button id="exportAll">Export All Conversations</button>

  <button id="browseConversations">Browse All Conversations</button>
  
  <div id="status"></div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
